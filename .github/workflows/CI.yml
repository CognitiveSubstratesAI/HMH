name: CI
on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        version: ['1.12']
        os: [ubuntu-latest]
        arch: [x64]
    steps:
      - uses: actions/checkout@v4
      # Downward dep chain HMH → FactorVSA → MORK → PathMap, all path-[sources].
      # Clone all three siblings adjacent before instantiation.
      - name: Clone PathMap + MORK + FactorVSA (path [sources] dependencies)
        run: |
          git clone --depth 1 https://github.com/CognitiveSubstratesAI/PathMap.git ../PathMap
          git clone --depth 1 https://github.com/CognitiveSubstratesAI/MORK.git ../MORK
          git clone --depth 1 https://github.com/CognitiveSubstratesAI/FactorVSA.git ../FactorVSA
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      - uses: julia-actions/julia-runtest@v1

  gate:
    name: Episodic margin gate (§8.6)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Clone PathMap + MORK + FactorVSA (path [sources] dependencies)
        run: |
          git clone --depth 1 https://github.com/CognitiveSubstratesAI/PathMap.git ../PathMap
          git clone --depth 1 https://github.com/CognitiveSubstratesAI/MORK.git ../MORK
          git clone --depth 1 https://github.com/CognitiveSubstratesAI/FactorVSA.git ../FactorVSA
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-buildpkg@v1
      # R-HMH's headline property: episodes are HDC-admissible at feasible D. Seeded,
      # deterministic. See STEP5_GATE_RESULT.md.
      - name: Run episodic gate and require PASS
        run: |
          out=$(julia --project=. bench/step5_gate.jl)
          echo "$out"
          if ! echo "$out" | grep -q "STEP-5 GATE VERDICT: PASS"; then
            echo "::error::Episodic margin gate did not PASS"
            exit 1
          fi
          echo "Episodic gate PASSED."

  format:
    name: Format (Blue)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - name: Check formatting
        run: |
          julia -e 'using Pkg; Pkg.add(PackageSpec(name="JuliaFormatter", version="2.5.2"))'
          julia -e 'using JuliaFormatter; println("JuliaFormatter ", pkgversion(JuliaFormatter))'
          julia -e 'using JuliaFormatter; format(".")'
          if ! git diff --quiet; then
            echo "::error::Formatting check failed — files below are not Blue-formatted:"
            git --no-pager diff --stat
            git --no-pager diff
            exit 1
          fi
          echo "All files Blue-formatted."
